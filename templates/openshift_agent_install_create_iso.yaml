---
- name: OpenShift Agent-Based Installer Workflow
  hosts: localhost
  connection: local
  vars:
    repo_url: "https://github.com/CCI-MOC/ai-ivp"
    repo_branch: "openshift-install"
    checkout_path: "./ai-ivp-repo"
    install_dir: "./ocp-build-assets"

  tasks:
    - name: Clone the repository
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        version: "{{ repo_branch }}"
        dest: "{{ checkout_path }}"
        depth: 1

    - name: Create fresh installation directory
      ansible.builtin.file:
        path: "{{ install_dir }}"
        state: directory
        mode: '0755'

    - name: Copy YAML files to build directory
      ansible.builtin.copy:
        src: "{{ checkout_path }}/{{ item }}"
        dest: "{{ install_dir }}/{{ item }}"
        mode: '0644'
      loop:
        - "agent-install.yaml"
        - "install-config.yaml"

    - name: Generate the Agent ISO
      # Use the absolute path or ensure openshift-install is in your $PATH
      ansible.builtin.command:
        cmd: "openshift-install agent create image --dir {{ install_dir }}"
      register: iso_generation
      changed_when: true

    - name: Display ISO location
      ansible.builtin.debug:
        msg: "ISO generated successfully at: {{ install_dir }}/agent.x86_64.iso"

    - name: Retrieve Kubeadmin credentials
      ansible.builtin.slurp:
        src: "{{ install_dir }}/auth/kubeadmin-password"
      register: kubeadmin_pass_encoded

    - name: Show Kubeadmin Password
      ansible.builtin.debug:
        msg: 
          - "CLUSTER INSTALLATION INITIATED"
          - "-----------------------------------"
          - "Kubeadmin Password: {{ kubeadmin_pass_encoded['content'] | b64decode }}"
          - "Kubeconfig Path: {{ playbook_dir }}/{{ install_dir }}/auth/kubeconfig"
          - "-----------------------------------"
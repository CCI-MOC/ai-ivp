---
- name: Install Portworx Operator and Configure Resources on OpenShift
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    portworx_namespace: "portworx"
    portworx_channel: "stable" 
    portworx_operator_name: "portworx-certified"
    portworx_catalog_source: "certified-operators"
    portworx_catalog_namespace: "openshift-marketplace"
    
    # Paths to your local files
    pure_secret_json_path: "./vars/pure.json"
    storageclass_yaml_path: "./vars/storageclass.yaml"
    portworx_csi_yaml_path: "./vars/portworx-csi.yaml"
    vlan_nncp_yaml_path: "./vars/vlan2305nncp.yaml"
    portworx_admin_network_path: "./vars/portworx-admin-network-policy.yaml"

  tasks:
    - name: Ensure the Portworx namespace exists
      kubernetes.core.k8s:
        name: "{{ portworx_namespace }}"
        kind: Namespace
        state: present

    - name: Create OperatorGroup for Portworx
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: operators.coreos.com/v1
          kind: OperatorGroup
          metadata:
            name: "{{ portworx_namespace }}-og"
            namespace: "{{ portworx_namespace }}"
          spec:
            targetNamespaces: []

    - name: Create Subscription for Portworx Operator
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: operators.coreos.com/v1alpha1
          kind: Subscription
          metadata:
            name: "{{ portworx_operator_name }}"
            namespace: "{{ portworx_namespace }}"
          spec:
            channel: "{{ portworx_channel }}"
            installPlanApproval: Automatic
            name: "{{ portworx_operator_name }}"
            source: "{{ portworx_catalog_source }}"
            sourceNamespace: "{{ portworx_catalog_namespace }}"

    - name: Wait for Portworx Operator CSV to become ready
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        namespace: "{{ portworx_namespace }}"
      register: csv_list
      until: >
        csv_list.resources | 
        selectattr('metadata.name', 'match', '^portworx-operator\.v.*') | 
        selectattr('status.phase', 'defined') | 
        selectattr('status.phase', 'equalto', 'Succeeded') | 
        selectattr('status.reason', 'defined') | 
        selectattr('status.reason', 'equalto', 'InstallSucceeded') | 
        list | length > 0
      retries: 30
      delay: 15

    # ----------------------------------------------------------------
    # New Tasks: Applying user-provided configurations
    # ----------------------------------------------------------------

    - name: Create px-pure-secret from pure.json
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: px-pure-secret
            namespace: "{{ portworx_namespace }}"
          type: Opaque
          stringData:
            # Looks up and loads the raw contents of your local pure.json file
            pure.json: "{{ lookup('ansible.builtin.file', pure_secret_json_path) }}"

    - name: Apply NodeNetworkConfigurationPolicy (vlan2305nncp.yaml)
      kubernetes.core.k8s:
        state: present
        src: "{{ vlan_nncp_yaml_path }}"
    
    - name: Apply AdminNetworkPolicy (portworx-admin-network-policy.yaml)
      kubernetes.core.k8s:
        state: present
        src: "{{ portworx_admin_network_path }}"

    - name: Apply Portworx CSI Storage Cluster (portworx-csi.yaml)
      kubernetes.core.k8s:
        state: present
        src: "{{ portworx_csi_yaml_path }}"

    - name: Apply StorageClass definition (storageclass.yaml)
      kubernetes.core.k8s:
        state: present
        src: "{{ storageclass_yaml_path }}"
        namespace: "{{ portworx_namespace }}"

    - name: Confirm successful deployment
      ansible.builtin.debug:
        msg: "Portworx Operator, Secrets, NNCP, CSI, and StorageClasses have been successfully applied."
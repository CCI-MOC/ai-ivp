---
- name: Setup OpenShift 4.21 Bastion Infrastructure
  hosts: localhost
  connection: local
  become: true
  vars:
    # OpenShift 4.21.0 Specifics
    ocp_version: "4.21.0"
    base_url: "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/{{ ocp_version }}"
    bin_dir: "/usr/local/bin"
    tmp_dir: "/tmp/ocp_install"
    sbin_dir: "/usr/sbin"

  tasks:
    - name: Create temporary directory for downloads
      ansible.builtin.file:
        path: "{{ tmp_dir }}"
        state: directory
        mode: '0755'

    - name: Install System Utilities and Infrastructure Services
      ansible.builtin.dnf:
        name:
          - git
          - jq
          - nmstate
          - haproxy
          - openssh-clients
          - wget
          - tar
          - bind-utils
          - httpd
        state: present

    - name: Start and enable Apache (httpd)
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true

    - name: Download OpenShift 4.21 Client and Installer
      ansible.builtin.get_url:
        url: "{{ base_url }}/{{ item }}"
        dest: "{{ tmp_dir }}/{{ item }}"
      loop:
        - openshift-client-linux.tar.gz
        - openshift-install-linux.tar.gz

    - name: Extract oc, kubectl, and openshift-install
      ansible.builtin.unarchive:
        src: "{{ tmp_dir }}/{{ item }}"
        dest: "{{ bin_dir }}"
        remote_src: true
      loop:
        - openshift-client-linux.tar.gz
        - openshift-install-linux.tar.gz

    - name: Ensure OpenShift binaries are executable
      ansible.builtin.file:
        path: "{{ bin_dir }}/{{ item }}"
        mode: '0755'
        owner: root
        group: root
      loop:
        - oc
        - kubectl
        - openshift-install

    - name: Install Helm 3
      block:
        - name: Download Helm binary
          ansible.builtin.get_url:
            url: https://get.helm.sh/helm-v3.20.2-linux-amd64.tar.gz
            dest: /tmp/helm.tar.gz
            mode: '0644'

        - name: Unarchive Helm binary
          ansible.builtin.unarchive:
            src: /tmp/helm.tar.gz
            dest: /tmp
            remote_src: true

        - name: Move Helm to bin directory
          ansible.builtin.copy:
            src: /tmp/linux-amd64/helm
            dest: "{{ bin_dir }}/helm"
            mode: '0755'
            remote_src: true

    - name: Verify Installations
      ansible.builtin.command: "{{ item.0 }}/{{ item.1 }}"
      loop:
        - ["{{ bin_dir }}", "oc version --client"]
        - ["{{ bin_dir }}", "openshift-install version"]
        - ["{{ bin_dir }}", "helm version --short"]
        - ["{{ sbin_dir }}", "httpd -v"]
      loop_control:
        label: "{{ item.1 }}"
      register: version_output
      changed_when: false

    - name: Display Binary Versions
      ansible.builtin.debug:
        msg: "{{ item.stdout }}"
      loop: "{{ version_output.results }}"
      loop_control:
        label: "{{ item.item.1 }}"

    - name: Cleanup temporary files
      ansible.builtin.file:
        path: "{{ tmp_dir }}"
        state: absent

---
- name: Provision Bastion Admin Accounts
  hosts: localhost
  become: true
  vars:
    sudo_timeout_mins: 30

  tasks:
    - name: Configure sudo with password and timeout for all users in the wheel group
      ansible.builtin.copy:
        dest: /etc/sudoers.d/wheel_config
        content: |
          # Require sudo passsword sudo password for wheel group
          %wheel ALL=(ALL) ALL
          # Set the grace period for sudo credentials
          Defaults:%wheel timestamp_timeout={{ sudo_timeout_mins }}
        mode: "0440"
        validate: "/usr/sbin/visudo -cf %s"

    - name: Ensure nullok is set for pam_unix.so password in system-auth
      community.general.pamd:
        name: system-auth
        type: password
        control: sufficient
        module_path: pam_unix.so
        module_arguments: nullok
        state: args_present
        
    - name: Create the user account and add it to the wheel group
      loop: "{{ bastion_users | default([], true) }}"
      loop_control:
        label: "{{ item.username }}"
      register: create_users
      ansible.builtin.user:
        name: "{{ item.username }}"
        comment: "{{ item.fullname }}"
        groups: wheel
        append: yes
        shell: /bin/bash
        state: present
        create_home: yes

    - name: Copy SSH public key to user .ssh directory
      loop: "{{ bastion_users | default([], true) }}"
      loop_control:
        label: "{{ item.username }}"
      ansible.posix.authorized_key:
        user: "{{ item.username }}"
        state: present
        key: "{{ item.ssh_key }}"

    - name: Require user to set password on first login
      loop: "{{ create_users.results }}"
      loop_control:
        label: "{{ item.item.username }}"
      when: item.changed
      shell: |
        passwd -d {{ item.item.username }}
        passwd -e {{ item.item.username }}
